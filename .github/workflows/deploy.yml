name: Deploy Frontend (main → produção)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e
            cd /var/www/mycriptonote/frontend
            git pull origin main
            npm ci
            npm run build
            mkdir -p /var/www/mycriptonote/frontend-dist
            rm -rf /var/www/mycriptonote/frontend-dist/*
            cp -r dist/mycriptonote/browser/* /var/www/mycriptonote/frontend-dist/ || cp -r dist/mycriptonote/* /var/www/mycriptonote/frontend-dist/

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mycriptonote-front
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    networks:
      - mycriptonote-net

volumes:
  node-modules:

networks:
  mycriptonote-net:
    external: true

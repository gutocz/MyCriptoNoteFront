<div class="login-page">
  <div class="brutal-card card">
    <h1>{{ 'auth.login.title' | translate }}</h1>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">{{ 'auth.login.email' | translate }}</label>
        <input id="email" type="email" class="brutal-input" formControlName="email" />
      </div>
      <div class="field">
        <label for="password">{{ 'auth.login.password' | translate }}</label>
        <input id="password" type="password" class="brutal-input" formControlName="password" />
      </div>
      @if (error) {
        <p class="error-msg">{{ error | translate }}</p>
      }
      <button type="submit" class="brutal-btn" [disabled]="loading">
        {{ loading ? ('common.loading' | translate) : ('auth.login.submit' | translate) }}
      </button>
    </form>
    <p class="footer-msg">
      {{ 'auth.login.noAccount' | translate }}
      <a routerLink="/register">{{ 'auth.login.register' | translate }}</a>
    </p>
  </div>
</div>

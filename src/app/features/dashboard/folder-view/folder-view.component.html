<div class="folder-view">
  <app-dashboard-header />
  <main class="main">
    <a routerLink="/notes" class="back-btn brutal-btn brutal-btn-secondary">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      {{ 'dashboard.backToNotes' | translate }}
    </a>

    <div class="folder-header">
      <h2 class="folder-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        {{ folder()?.name ?? '...' }}
      </h2>
      <button type="button" class="brutal-btn create-note-btn" (click)="openCreateNote()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        {{ 'dashboard.createNoteInFolder' | translate }}
      </button>
    </div>

    <div class="folder-search">
      <app-search-bar [value]="search()" (valueChange)="onSearch($event)" />
    </div>

    <div class="notes-grid">
      @for (n of filteredNotes(); track n.id) {
        <app-note-card [note]="n" (clicked)="openNote(n)" />
      } @empty {
        <p class="empty-text">{{ 'dashboard.emptyNotes' | translate }}</p>
      }
    </div>
  </main>

  @if (selectedNote(); as note) {
    <app-note-modal
      [note]="note"
      [isOpen]="noteModalOpen()"
      [folders]="folders()"
      (closed)="closeNoteModal()"
      (updated)="onRefresh()"
      (deleted)="onRefresh()"
    />
  }

  <app-create-modal
    type="note"
    [isOpen]="createOpen()"
    [folders]="folders()"
    [preselectedFolderId]="folderId"
    (closed)="closeCreateNote()"
    (created)="onNoteCreated()"
  />
</div>
